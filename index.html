<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6S Squad Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 2rem; color: #f5a623; letter-spacing: 3px; text-transform: uppercase; }
  header p { color: #888; font-size: 0.85rem; margin-top: 4px; }

  .dashboard {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .card {
    background: #12121a;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    width: 210px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: #f5a623; }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #f5a623, #e05c00);
  }

  .card-header { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #f5a623, #e05c00);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: bold; color: #fff; text-transform: uppercase;
  }
  .username { font-size: 1rem; font-weight: 700; color: #fff; text-align: center; word-break: break-all; }
  .rank-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #1e1e2e; border-radius: 20px; padding: 4px 12px;
    font-size: 0.78rem; font-weight: 600; border: 1px solid #3a3a4a;
  }
  .rank-img { width: 20px; height: 20px; object-fit: contain; }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: #1a1a26; border-radius: 8px; padding: 8px 6px; text-align: center; }
  .stat-value { font-size: 1.1rem; font-weight: 700; color: #f5a623; }
  .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat.full-width { grid-column: span 2; }

  .section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #555; text-align: center; }
  .match-history { display: flex; gap: 5px; justify-content: center; }
  .match {
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
  }
  .match.win    { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
  .match.loss   { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
  .match.unknown{ background: #2a2a2a; color: #666;    border: 1px solid #444; }

  .loading { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 0; color: #666; font-size: 0.8rem; }
  .spinner { width: 24px; height: 24px; border: 2px solid #2a2a3a; border-top-color: #f5a623; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #1e1010; border: 1px solid #5a2020; border-radius: 8px;
    padding: 10px; font-size: 0.72rem; color: #cc6666; text-align: center; line-height: 1.5;
  }
  .error-box a { color: #f5a623; text-decoration: none; display: block; margin-top: 6px; font-weight: 600; }
  .error-box a:hover { text-decoration: underline; }

  .refresh-btn {
    background: none; border: 1px solid #3a3a4a; color: #888;
    border-radius: 6px; padding: 4px 10px; font-size: 0.7rem;
    cursor: pointer; align-self: center; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: #f5a623; color: #f5a623; }
  .last-updated { text-align: center; font-size: 0.7rem; color: #444; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>⚔ R6S Squad Dashboard</h1>
  <p>Rainbow Six Siege — Current Ranked Season Stats</p>
</header>

<div class="dashboard" id="dashboard"></div>
<div class="last-updated" id="lastUpdated"></div>

<script>
const PROXY_URL = "https://r6-proxy.vercel.app/api/r6stats";

const PLAYERS = [
  "SirKaur", "sysaxis", "Ow4er", "iFriis_", "Olesc"
];

function fmt(v, d=2) {
  if (v == null || isNaN(v)) return "—";
  return Number(v).toFixed(d);
}
function fmtInt(v) {
  if (v == null) return "—";
  return Math.round(v).toLocaleString();
}

function loadingHTML(name) {
  return `
    <div class="card-header">
      <div class="avatar">${name[0]}</div>
      <div class="username">${name}</div>
      <div class="rank-badge" style="color:#888">⏳ Loading...</div>
    </div>
    <div class="loading"><div class="spinner"></div><span>Fetching stats…</span></div>`;
}

function errorHTML(name, msg) {
  return `
    <div class="card-header">
      <div class="avatar">${name[0]}</div>
      <div class="username">${name}</div>
    </div>
    <div class="error-box">${msg}
      <a href="https://r6data.eu/profile/psn/${encodeURIComponent(name)}" target="_blank">View on R6Data ↗</a>
    </div>
    <button class="refresh-btn" onclick="loadPlayer('${name}', this.closest('.card'))">↻ Retry</button>`;
}

function parseData(data) {
  // --- Ranked stats from platform_families_full_profiles ---
  const boardProfiles = data.stats
    ?.platform_families_full_profiles?.[0]
    ?.board_ids_full_profiles ?? [];

  const rankedBoard = boardProfiles.find(b => b.board_id === "pvp_ranked");
  const ranked = rankedBoard?.full_profiles?.[0]?.profile ?? null;

  const kills  = ranked?.kills  ?? null;
  const deaths = ranked?.deaths ?? null;
  const wins   = ranked?.wins   ?? null;
  const losses = ranked?.losses ?? null;
  const rp     = ranked?.rank_points ?? null;

  const kd = (kills != null && deaths != null && deaths > 0)
    ? kills / deaths : (kills != null && deaths === 0 ? kills : null);
  const wl = (wins != null && losses != null && losses > 0)
    ? wins / losses : (wins != null && losses === 0 ? wins : null);

  // --- Rank name + image from seasonal history (most recent entry) ---
  const history = data.seasonal?.data?.history?.data ?? [];
  const latestEntry = history[0]; // most recent
  const rankName  = latestEntry?.[1]?.metadata?.rank  ?? "Unranked";
  const rankColor = latestEntry?.[1]?.metadata?.color ?? "#888";
  const rankImg   = latestEntry?.[1]?.metadata?.imageUrl ?? null;

  // --- Last 5 matches from rank points timeline ---
  // A win = RP went up or stayed same after placement, loss = RP went down
  const matchBoxes = history.slice(0, 5).map((entry, i) => {
    const curr = entry[1]?.value ?? 0;
    const prev = history[i + 1]?.[1]?.value;
    if (prev == null) return `<div class="match unknown">?</div>`;
    const won = curr >= prev;
    return `<div class="match ${won ? 'win' : 'loss'}">${won ? 'W' : 'L'}</div>`;
  }).join("") || Array(5).fill(`<div class="match unknown">?</div>`).join("");

  return { kills, deaths, wins, losses, kd, wl, rp, rankName, rankColor, rankImg, matchBoxes };
}

function renderStats(cardEl, name, data) {
  const { kills, deaths, wins, losses, kd, wl, rp, rankName, rankColor, rankImg, matchBoxes } = parseData(data);

  const rankBadge = rankImg
    ? `<img class="rank-img" src="${rankImg}" alt="${rankName}"> <span style="color:${rankColor}">${rankName}</span>`
    : `<span style="color:${rankColor}">${rankName}</span>`;

  cardEl.innerHTML = `
    <div class="card-header">
      <div class="avatar">${name[0]}</div>
      <div class="username">${name}</div>
      <div class="rank-badge">${rankBadge}
        ${rp != null ? `<span style="color:#666;font-size:0.65rem">(${fmtInt(rp)} RP)</span>` : ""}
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-value">${fmtInt(kills)}</div>
        <div class="stat-label">Kills</div>
      </div>
      <div class="stat">
        <div class="stat-value">${fmt(kd)}</div>
        <div class="stat-label">K/D</div>
      </div>
      <div class="stat">
        <div class="stat-value">${fmtInt(wins)}</div>
        <div class="stat-label">Wins</div>
      </div>
      <div class="stat">
        <div class="stat-value">${fmtInt(losses)}</div>
        <div class="stat-label">Losses</div>
      </div>
      <div class="stat full-width">
        <div class="stat-value">${wl != null ? fmt(wl) : "—"}</div>
        <div class="stat-label">W/L Ratio</div>
      </div>
    </div>
    <div class="section-title">Last 5 Ranked Matches</div>
    <div class="match-history">${matchBoxes}</div>
    <button class="refresh-btn" onclick="loadPlayer('${name}', this.closest('.card'))">↻ Refresh</button>`;
}

async function loadPlayer(name, cardEl) {
  cardEl.innerHTML = loadingHTML(name);
  try {
    const res = await fetch(`${PROXY_URL}?username=${encodeURIComponent(name)}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      cardEl.innerHTML = errorHTML(name, err.error ?? `HTTP ${res.status}`);
      return;
    }
    const data = await res.json();
    if (data.error) { cardEl.innerHTML = errorHTML(name, data.error); return; }
    renderStats(cardEl, name, data);
  } catch (err) {
    cardEl.innerHTML = errorHTML(name, `Failed to load: ${err.message}`);
  }
}

async function loadAll() {
  const dashboard = document.getElementById("dashboard");
  dashboard.innerHTML = "";
  const cards = PLAYERS.map(name => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = loadingHTML(name);
    dashboard.appendChild(card);
    return card;
  });
  for (let i = 0; i < PLAYERS.length; i++) {
    await loadPlayer(PLAYERS[i], cards[i]);
    await new Promise(r => setTimeout(r, 350));
  }
  document.getElementById("lastUpdated").textContent =
    `Last updated: ${new Date().toLocaleTimeString()}`;
}

loadAll();
</script>
</body>
</html>
