<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6S LANcrew Stats</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #07070f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 28px 16px; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(245,166,35,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(245,166,35,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle { position: absolute; background: #f5a623; border-radius: 50%; opacity: 0; animation: float linear infinite; }
  @keyframes float { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 0.4; } 90% { opacity: 0.2; } 100% { transform: translateY(-10vh) translateX(40px); opacity: 0; } }
  header { text-align: center; margin-bottom: 28px; position: relative; z-index: 1; }
  header h1 { font-size: 2.2rem; color: #f5a623; letter-spacing: 4px; text-transform: uppercase; text-shadow: 0 0 30px rgba(245,166,35,0.4); }
  header p { color: #666; font-size: 0.82rem; margin-top: 4px; letter-spacing: 1px; }
  .header-controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 12px; }
  .refresh-all-btn { background: linear-gradient(135deg, #f5a623, #e05c00); border: none; color: #000; border-radius: 8px; padding: 7px 20px; font-size: 0.8rem; font-weight: 700; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: opacity 0.2s, transform 0.1s; box-shadow: 0 0 16px rgba(245,166,35,0.3); }
  .refresh-all-btn:hover { opacity: 0.85; transform: scale(1.03); }
  .last-updated { font-size: 0.72rem; color: #555; }
  .timer { font-size: 0.72rem; color: #444; }
  .dashboard { display: flex; flex-direction: column; align-items: center; gap: 16px; position: relative; z-index: 1; }
  .card { background: linear-gradient(160deg, #13131e, #0e0e18); border: 1px solid #2a2a3a; border-radius: 14px; width: 100%; max-width: 480px; padding: 18px 20px; display: flex; flex-direction: column; gap: 11px; position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.3s; }
  .card:hover { transform: translateY(-2px); }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--rank-color, #f5a623); }
  .card-header { display: flex; flex-direction: row; align-items: center; gap: 14px; }
  .avatar-wrap { position: relative; flex-shrink: 0; width: 64px; height: 64px; }
  .avatar-rank-img { width: 64px; height: 64px; object-fit: contain; filter: drop-shadow(0 0 8px var(--rank-color, #f5a623)); }
  .avatar-fallback { width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, #f5a623, #e05c00); display: flex; align-items: center; justify-content: center; font-size: 1.6rem; font-weight: bold; color: #fff; }
  .level-badge { position: absolute; bottom: -4px; right: -4px; background: #1a1a2a; border: 1px solid #3a3a4a; border-radius: 8px; padding: 1px 5px; font-size: 0.6rem; color: #aaa; font-weight: 600; }
  .header-info { display: flex; flex-direction: column; gap: 4px; }
  .username { font-size: 1.1rem; font-weight: 700; color: #fff; }
  .rank-badge { display: inline-flex; align-items: center; gap: 5px; background: #1a1a2a; border-radius: 20px; padding: 3px 10px; font-size: 0.75rem; font-weight: 600; border: 1px solid #2a2a3a; }
  .rank-img-small { width: 16px; height: 16px; object-fit: contain; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { background: #10101a; border-radius: 8px; padding: 8px 6px; text-align: center; border: 1px solid #1e1e2e; }
  .stat-value { font-size: 1.05rem; font-weight: 700; }
  .stat-label { font-size: 0.6rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .span2 { grid-column: span 2; }
  .good { color: #4caf50; } .bad { color: #f44336; } .neutral { color: #f5a623; }
  .winrate-bar-bg { height: 5px; background: #1a1a2a; border-radius: 3px; overflow: hidden; margin-top: 4px; }
  .winrate-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
  .winrate-label { display: flex; justify-content: space-between; font-size: 0.6rem; color: #555; margin-top: 2px; }
  .operators-row { display: flex; gap: 8px; }
  .operator-card { flex: 1; background: #10101a; border: 1px solid #1e1e2e; border-radius: 8px; padding: 7px 8px; display: flex; align-items: center; gap: 8px; }
  .operator-icon { width: 36px; height: 36px; object-fit: contain; flex-shrink: 0; }
  .operator-placeholder { width: 36px; height: 36px; background: #1a1a2a; border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; color: #555; }
  .operator-info { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .operator-side { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.5px; }
  .atk-side { color: #f5a623; } .def-side { color: #4caf50; }
  .operator-name { font-size: 0.78rem; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .operator-rounds { font-size: 0.6rem; color: #555; }
  .section-title { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 1px; color: #888; text-align: center; }
  .match-history { display: flex; flex-direction: row; gap: 6px; justify-content: center; }
  .match { width: 48px; height: 52px; border-radius: 8px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; gap: 3px; }
  .match.win { background: #1a4a1a; color: #4caf50; border: 1px solid #4caf50; }
  .match.loss { background: #4a1a1a; color: #f44336; border: 1px solid #f44336; }
  .match.unknown { background: #1a1a2a; color: #555; border: 1px solid #3a3a4a; }
  .match.newest { animation: pulse-match 2s ease-in-out infinite; }
  @keyframes pulse-match { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  .match-rp { font-size: 0.58rem; }
  .bourne-gif { width: 100%; border-radius: 8px; display: block; }
  .loading { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 24px 0; color: #555; font-size: 0.8rem; }
  .spinner { width: 26px; height: 26px; border: 2px solid #1e1e2e; border-top-color: #f5a623; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { background: #150808; border: 1px solid #4a1a1a; border-radius: 8px; padding: 10px; font-size: 0.7rem; color: #bb5555; text-align: center; line-height: 1.6; }
  .error-box a { color: #f5a623; text-decoration: none; display: block; margin-top: 5px; font-weight: 600; }
  .card-refresh-btn { background: none; border: 1px solid #2a2a3a; color: #555; border-radius: 6px; padding: 4px 10px; font-size: 0.68rem; cursor: pointer; align-self: center; transition: all 0.2s; }
  .card-refresh-btn:hover { border-color: #f5a623; color: #f5a623; }
</style>
</head>
<body>

<div class="particles" id="particles"></div>

<header>
  <h1>&#9876; R6S LANcrew Stats</h1>
  <p>Rainbow Six Siege &#8212; Current Ranked Season</p>
  <div class="header-controls">
    <button class="refresh-all-btn" onclick="loadAll()">&#8635; Refresh All</button>
    <span class="last-updated" id="lastUpdated">&#8212;</span>
    <span class="timer" id="timer"></span>
  </div>
</header>

<div class="dashboard" id="dashboard"></div>

<script>
var PROXY_URL  = "https://r6-proxy.vercel.app/api/r6stats";
var PLAYERS    = ["SirKaur", "sysaxis", "Ow4er", "iFriis_", "Olesc"];
var BOURNE_GIF = "https://brocifist.github.io/r6-squad-stats/bourne.gif";

var operatorIconMap = {};
var lastLoadTime = null;
var kdMap = {};
var playerCards = {};

// Particles
(function() {
  var c = document.getElementById("particles");
  for (var i = 0; i < 18; i++) {
    var p = document.createElement("div");
    p.className = "particle";
    p.style.left = (Math.random() * 100) + "vw";
    p.style.width = (1 + Math.random() * 2) + "px";
    p.style.height = p.style.width;
    p.style.animationDuration = (10 + Math.random() * 20) + "s";
    p.style.animationDelay = (Math.random() * 15) + "s";
    c.appendChild(p);
  }
})();

setInterval(function() {
  if (!lastLoadTime) return;
  var mins = Math.floor((Date.now() - lastLoadTime) / 60000);
  document.getElementById("timer").textContent = mins < 1 ? "Updated just now" : "Updated " + mins + "m ago";
}, 15000);

function fmt(v, d) {
  if (v == null || isNaN(v)) return "&#8212;";
  return Number(v).toFixed(d != null ? d : 2);
}
function fmtInt(v) {
  if (v == null) return "&#8212;";
  return Math.round(v).toLocaleString();
}
function kdClass(v) { return v == null ? "neutral" : v >= 1 ? "good" : "bad"; }
function wlClass(v) { return v == null ? "neutral" : v >= 1 ? "good" : "bad"; }

function getOperatorIconUrl(name) {
  if (!name) return null;
  // r6data.eu uses predictable icon URLs based on operator safename
  var safename = name.toLowerCase()
    .replace(/\s+/g, "-")
    .replace(/[äöüß]/g, function(c) { return {ä:"a",ö:"o",ü:"u",ß:"ss"}[c] || c; })
    .replace(/[^a-z0-9-]/g, "");
  return "https://r6data.eu/assets/img/operators/icons/" + safename + ".webp";
}

function fetchOperatorIcons() {
  // Icons are constructed from operator names directly — no API call needed
  return Promise.resolve();
}

function loadingHTML(name) {
  return '<div class="card-header">' +
    '<div class="avatar-wrap"><div class="avatar-fallback">' + name[0] + '</div></div>' +
    '<div class="header-info">' +
    '<div class="username">' + name + '</div>' +
    '<div class="rank-badge" style="color:#555">Loading...</div>' +
    '</div></div>' +
    '<div class="loading"><div class="spinner"></div><span>Fetching stats</span></div>';
}

function errorHTML(name, msg) {
  return '<div class="card-header">' +
    '<div class="avatar-wrap"><div class="avatar-fallback">' + name[0] + '</div></div>' +
    '<div class="header-info"><div class="username">' + name + '</div></div></div>' +
    '<div class="error-box">' + msg +
    '<a href="https://r6data.eu/profile/psn/' + encodeURIComponent(name) + '" target="_blank">View on R6Data</a></div>' +
    '<button class="card-refresh-btn" onclick="loadPlayer(\'' + name + '\')">Retry</button>';
}

function getTopOperators(opData) {
  // New API format: operators is a flat array with side field
  var ops = Array.isArray(opData.operators) ? opData.operators : [];
  var atk = null, def = null, maxAtk = -1, maxDef = -1;
  ops.forEach(function(op) {
    var rounds = op.roundsPlayed || 0;
    if (!rounds) return;
    if (op.side === "Attacker") {
      if (rounds > maxAtk) { maxAtk = rounds; atk = { name: op.operator, rounds: rounds }; }
    } else if (op.side === "Defender") {
      if (rounds > maxDef) { maxDef = rounds; def = { name: op.operator, rounds: rounds }; }
    }
  });
  return { atk: atk, def: def };
}

function operatorCardHTML(op, isAtk) {
  var label = isAtk ? "ATK" : "DEF";
  var cls   = isAtk ? "atk-side" : "def-side";
  if (!op) {
    return '<div class="operator-card"><div class="operator-placeholder">?</div>' +
      '<div class="operator-info"><span class="operator-side ' + cls + '">' + label + '</span>' +
      '<span class="operator-name">Unknown</span></div></div>';
  }
  var iconUrl = getOperatorIconUrl(op.name);
  var iconHTML = iconUrl
    ? '<img class="operator-icon" src="' + iconUrl + '" alt="' + op.name + '" onerror="this.style.display=\'none\'">'
    : '<div class="operator-placeholder">' + (op.name ? op.name[0] : "?") + '</div>';
  return '<div class="operator-card">' + iconHTML +
    '<div class="operator-info">' +
    '<span class="operator-side ' + cls + '">' + label + '</span>' +
    '<span class="operator-name">' + (op.name || "Unknown") + '</span>' +
    '<span class="operator-rounds">' + (op.rounds || 0) + ' rounds</span>' +
    '</div></div>';
}

function renderStats(cardEl, name, data) {
  var boards = [];
  if (data.stats && data.stats.platform_families_full_profiles && data.stats.platform_families_full_profiles[0]) {
    boards = data.stats.platform_families_full_profiles[0].board_ids_full_profiles || [];
  }
  var rankedBoard = null;
  for (var i = 0; i < boards.length; i++) {
    if (boards[i].board_id === "ranked") { rankedBoard = boards[i]; break; }
  }
  var fp          = rankedBoard && rankedBoard.full_profiles && rankedBoard.full_profiles[0] ? rankedBoard.full_profiles[0] : null;
  var profile     = fp ? fp.profile : null;
  var seasonStats = fp ? fp.season_statistics : null;

  var kills  = profile ? profile.kills        : null;
  var deaths = profile ? profile.deaths       : null;
  var wins   = profile ? profile.wins         : null;
  var losses = profile ? profile.losses       : null;
  var rp     = profile ? profile.rank_points  : null;

  var kd = (kills != null && deaths != null) ? (deaths > 0 ? kills / deaths : kills) : null;
  var wl = (wins  != null && losses  != null) ? (losses > 0 ? wins  / losses : wins)  : null;
  var total = (wins != null && losses != null) ? wins + losses : 0;
  var winPct = total > 0 ? (wins / total) * 100 : null;

  // Headshot % — calculate from operators array (weighted average across all ranked ops)
  var hsPercent = null;
  if (data.operators && Array.isArray(data.operators.operators) && data.operators.operators.length > 0) {
    var totalKills = 0, totalHeadshots = 0;
    data.operators.operators.forEach(function(op) {
      var k = op.kills || 0;
      var hs = op.headshots || 0;
      totalKills += k;
      totalHeadshots += hs;
    });
    if (totalKills > 0) hsPercent = (totalHeadshots / totalKills) * 100;
  }

  var history   = (data.seasonal && data.seasonal.data && data.seasonal.data.history) ? data.seasonal.data.history.data || [] : [];
  var latest    = history[0];
  var rankName  = (latest && latest[1] && latest[1].metadata) ? latest[1].metadata.rank     || "Unranked" : "Unranked";
  var rankColor = (latest && latest[1] && latest[1].metadata) ? latest[1].metadata.color    || "#888"     : "#888";
  var rankImg   = (latest && latest[1] && latest[1].metadata) ? latest[1].metadata.imageUrl || null       : null;
  var level     = (data.account && data.account.profile) ? data.account.profile.level : null;

  var matchesRaw = [];
  for (var m = 0; m < Math.min(5, history.length); m++) {
    var curr = history[m] && history[m][1] ? history[m][1].value : 0;
    var prev = history[m + 1] && history[m + 1][1] ? history[m + 1][1].value : null;
    if (prev == null) {
      matchesRaw.push({ result: "unknown", rp: null });
    } else {
      matchesRaw.push({ result: curr >= prev ? "win" : "loss", rp: curr - prev });
    }
  }
  var matches = matchesRaw.reverse();

  var ops = getTopOperators(data.operators || {});

  kdMap[name] = kd;
  cardEl.style.setProperty("--rank-color", rankColor);
  cardEl.style.boxShadow = "0 4px 32px " + rankColor + "18";

  var avatarHTML = rankImg
    ? '<img class="avatar-rank-img" src="' + rankImg + '" alt="' + rankName + '">'
    : '<div class="avatar-fallback">' + name[0] + '</div>';
  var levelHTML  = level != null ? '<div class="level-badge">Lv.' + level + '</div>' : '';
  var badgeInner = rankImg
    ? '<img class="rank-img-small" src="' + rankImg + '" alt=""> <span style="color:' + rankColor + '">' + rankName + '</span>'
    : '<span style="color:' + rankColor + '">' + rankName + '</span>';
  var rpHTML = rp != null ? '<span style="color:#444;font-size:0.62rem">(' + fmtInt(rp) + ' RP)</span>' : '';

  var matchHTML = '';
  for (var j = 0; j < matches.length; j++) {
    var mc = matches[j];
    var newest = j === matches.length - 1 ? ' newest' : '';
    var rpStr  = mc.rp != null ? '<span class="match-rp">' + (mc.rp > 0 ? '+' : '') + mc.rp + '</span>' : '';
    var lbl    = mc.result === 'win' ? 'W' : mc.result === 'loss' ? 'L' : '?';
    matchHTML += '<div class="match ' + mc.result + newest + '">' + lbl + rpStr + '</div>';
  }
  if (!matchHTML) {
    for (var k = 0; k < 5; k++) matchHTML += '<div class="match unknown">?</div>';
  }

  var fill = winPct != null ? Math.round(winPct) : 0;
  var barHTML = winPct != null
    ? '<div class="winrate-bar-bg"><div class="winrate-bar-fill" style="width:' + fill + '%;background:hsl(' + Math.round(fill * 1.2) + ',80%,45%)"></div></div>' +
      '<div class="winrate-label"><span>0%</span><span>' + fill + '% WR</span><span>100%</span></div>'
    : '';

  cardEl.innerHTML =
    '<div class="card-header">' +
      '<div class="avatar-wrap">' + avatarHTML + levelHTML + '</div>' +
      '<div class="header-info">' +
        '<div class="username">' + name + '</div>' +
        '<div class="rank-badge">' + badgeInner + ' ' + rpHTML + '</div>' +
      '</div>' +
    '</div>' +
    '<div class="stats-grid">' +
      '<div class="stat"><div class="stat-value neutral">' + fmtInt(kills)  + '</div><div class="stat-label">Kills</div></div>' +
      '<div class="stat"><div class="stat-value bad">'     + fmtInt(deaths) + '</div><div class="stat-label">Deaths</div></div>' +
      '<div class="stat"><div class="stat-value neutral">' + fmt(hsPercent, 1) + '%</div><div class="stat-label">HS%</div></div>' +
      '<div class="stat"><div class="stat-value ' + kdClass(kd) + '">' + fmt(kd, 2) + '</div><div class="stat-label">K/D</div></div>' +
      '<div class="stat"><div class="stat-value good">' + fmtInt(wins)   + '</div><div class="stat-label">Wins</div></div>' +
      '<div class="stat"><div class="stat-value bad">'  + fmtInt(losses) + '</div><div class="stat-label">Losses</div></div>' +
      '<div class="stat"><div class="stat-value ' + wlClass(wl) + '">' + fmt(wl, 2) + '</div><div class="stat-label">W/L</div></div>' +
      '<div class="stat span2">' + barHTML + '</div>' +
    '</div>' +
    '<div class="section-title">Most Played Operators</div>' +
    '<div class="operators-row">' + operatorCardHTML(ops.atk, true) + operatorCardHTML(ops.def, false) + '</div>' +
    '<div class="section-title">Last 5 Ranked Matches</div>' +
    '<div class="match-history">' + matchHTML + '</div>' +
    '<button class="card-refresh-btn" onclick="loadPlayer(\'' + name + '\')">Refresh</button>';
}

function updateBourneGif() {
  var existing = document.querySelectorAll(".bourne-gif");
  for (var i = 0; i < existing.length; i++) existing[i].remove();

  var best = null;
  Object.keys(kdMap).forEach(function(n) {
    if (kdMap[n] != null && (best === null || kdMap[n] > kdMap[best])) best = n;
  });
  if (!best) return;

  var card = playerCards[best];
  if (!card) return;
  var gif = document.createElement("img");
  gif.className = "bourne-gif";
  gif.src = BOURNE_GIF;
  gif.alt = "Jason Bourne";
  gif.title = best + " has the best K/D!";
  card.appendChild(gif);
}

function loadPlayer(name) {
  var card = playerCards[name];
  if (!card) return Promise.resolve();
  card.style.boxShadow = "";
  card.style.removeProperty("--rank-color");
  card.innerHTML = loadingHTML(name);
  delete kdMap[name];

  return fetch(PROXY_URL + "?username=" + encodeURIComponent(name))
    .then(function(res) {
      if (!res.ok) {
        return res.json().catch(function() { return {}; }).then(function(e) {
          card.innerHTML = errorHTML(name, e.error || ("HTTP " + res.status));
        });
      }
      return res.json().then(function(data) {
        if (data.error) { card.innerHTML = errorHTML(name, data.error); return; }
        renderStats(card, name, data);
      });
    })
    .catch(function(err) {
      card.innerHTML = errorHTML(name, "Failed to load: " + err.message);
    });
}

function loadAll() {
  var dashboard = document.getElementById("dashboard");
  dashboard.innerHTML = "";
  Object.keys(playerCards).forEach(function(k) { delete playerCards[k]; });
  Object.keys(kdMap).forEach(function(k) { delete kdMap[k]; });

  PLAYERS.forEach(function(name) {
    var card = document.createElement("div");
    card.className = "card";
    card.innerHTML = loadingHTML(name);
    dashboard.appendChild(card);
    playerCards[name] = card;
  });

  fetchOperatorIcons().then(function() {
    var chain = Promise.resolve();
    PLAYERS.forEach(function(name) {
      chain = chain.then(function() {
        return loadPlayer(name).then(function() {
          return new Promise(function(r) { setTimeout(r, 350); });
        });
      });
    });
    return chain;
  }).then(function() {
    updateBourneGif();
    lastLoadTime = Date.now();
    document.getElementById("lastUpdated").textContent = "Last updated: " + new Date().toLocaleTimeString();
    document.getElementById("timer").textContent = "Updated just now";
  });
}

loadAll();
</script>
</body>
</html>
