<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>R6S Squad Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 20px;
  }
  header { text-align: center; margin-bottom: 24px; }
  header h1 { font-size: 2rem; color: #f5a623; letter-spacing: 3px; text-transform: uppercase; }
  header p { color: #888; font-size: 0.85rem; margin-top: 4px; }

  .dashboard {
    display: flex;
    gap: 12px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .card {
    background: #12121a;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    width: 210px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }
  .card:hover { border-color: #f5a623; }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #f5a623, #e05c00);
  }

  .card-header { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, #f5a623, #e05c00);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: bold; color: #fff; text-transform: uppercase;
  }
  .username { font-size: 1rem; font-weight: 700; color: #fff; text-align: center; word-break: break-all; }
  .rank-badge {
    display: inline-flex; align-items: center; gap: 5px;
    background: #1e1e2e; border-radius: 20px; padding: 3px 10px;
    font-size: 0.75rem; font-weight: 600; color: #f5a623; border: 1px solid #3a3a4a;
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: #1a1a26; border-radius: 8px; padding: 8px 6px; text-align: center; }
  .stat-value { font-size: 1.1rem; font-weight: 700; color: #f5a623; }
  .stat-label { font-size: 0.65rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .stat.full-width { grid-column: span 2; }

  .section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #555; text-align: center; }
  .match-history { display: flex; gap: 5px; justify-content: center; }
  .match {
    width: 32px; height: 32px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700;
  }
  .match.win    { background: #1a3a1a; color: #4caf50; border: 1px solid #4caf50; }
  .match.loss   { background: #3a1a1a; color: #f44336; border: 1px solid #f44336; }
  .match.unknown{ background: #2a2a2a; color: #666;    border: 1px solid #444; }

  .loading { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 20px 0; color: #666; font-size: 0.8rem; }
  .spinner { width: 24px; height: 24px; border: 2px solid #2a2a3a; border-top-color: #f5a623; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: #1e1010; border: 1px solid #5a2020; border-radius: 8px;
    padding: 10px; font-size: 0.72rem; color: #cc6666; text-align: center; line-height: 1.5;
  }
  .error-box a { color: #f5a623; text-decoration: none; display: block; margin-top: 6px; font-weight: 600; }
  .error-box a:hover { text-decoration: underline; }

  .refresh-btn {
    background: none; border: 1px solid #3a3a4a; color: #888;
    border-radius: 6px; padding: 4px 10px; font-size: 0.7rem;
    cursor: pointer; align-self: center; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: #f5a623; color: #f5a623; }
  .last-updated { text-align: center; font-size: 0.7rem; color: #444; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1>⚔ R6S Squad Dashboard</h1>
  <p>Rainbow Six Siege — Ranked Season Stats</p>
</header>

<div class="dashboard" id="dashboard"></div>
<div class="last-updated" id="lastUpdated"></div>

<script>
const PROXY_URL = "https://r6-proxy.vercel.app/api/r6stats";

const PLAYERS = [
  { name: "SirKaur"  },
  { name: "sysaxis"  },
  { name: "Ow4er"    },
  { name: "iFriis_"  },
  { name: "Olesc"    },
];

const RANK_COLORS = {
  copper: "#b87333", bronze: "#cd7f32", silver: "#b0bec5",
  gold: "#f5a623", platinum: "#00bcd4", emerald: "#2ecc71",
  diamond: "#9b59b6", champion: "#ffd700"
};

const RANK_ICONS = {
  copper: "🟤", bronze: "🥉", silver: "🥈", gold: "🥇",
  platinum: "💠", emerald: "💚", diamond: "💎", champion: "👑"
};

function getRankStyle(rankName) {
  if (!rankName) return { color: "#888", icon: "❓" };
  const l = rankName.toLowerCase();
  for (const key of Object.keys(RANK_COLORS)) {
    if (l.includes(key)) return { color: RANK_COLORS[key], icon: RANK_ICONS[key] };
  }
  return { color: "#888", icon: "🎖" };
}

function fmt(v, d = 2) {
  if (v == null) return "—";
  return typeof v === "number" ? v.toFixed(d) : v;
}
function fmtInt(v) {
  if (v == null) return "—";
  return Math.round(v).toLocaleString();
}

function loadingHTML(name) {
  return `
    <div class="card-header">
      <div class="avatar">${name[0]}</div>
      <div class="username">${name}</div>
      <div class="rank-badge">⏳ Loading...</div>
    </div>
    <div class="loading"><div class="spinner"></div><span>Fetching stats…</span></div>`;
}

function errorHTML(name, msg) {
  const url = `https://www.ubisoft.com/en-gb/game/rainbow-six/siege/stats`;
  return `
    <div class="card-header">
      <div class="avatar">${name[0]}</div>
      <div class="username">${name}</div>
    </div>
    <div class="error-box">${msg}<a href="${url}" target="_blank">Ubisoft Stats ↗</a></div>
    <button class="refresh-btn" onclick="loadPlayer('${name}', this.closest('.card'))">↻ Retry</button>`;
}

function renderStats(cardEl, name, data) {
  const { stats, history } = data;

  // Pull current season ranked data
  const seasons = stats?.seasons || stats?.ranked?.seasons || [];
  const current = Array.isArray(seasons) ? seasons[0] : null;

  const kills  = current?.kills         ?? stats?.ranked?.kills;
  const deaths = current?.deaths        ?? stats?.ranked?.deaths;
  const wins   = current?.wins          ?? stats?.ranked?.wins;
  const losses = current?.losses        ?? stats?.ranked?.losses;
  const kd     = (kills != null && deaths != null && deaths > 0)
                   ? (kills / deaths) : (current?.kd ?? stats?.ranked?.kd);
  const wl     = (wins != null && losses != null && losses > 0)
                   ? (wins / losses) : null;
  const rankName = current?.rank?.name  ?? stats?.ranked?.rank?.name ?? null;
  const mmr      = current?.mmr         ?? stats?.ranked?.mmr ?? null;

  const { color, icon } = getRankStyle(rankName);

  // Match history — last 5
  const matches = history?.matches ?? history?.data ?? [];
  const last5 = matches.slice(0, 5);
  const matchBoxes = last5.length > 0
    ? last5.map(m => {
        const won = m.won === true || m.result === "win" || m.outcome === "win";
        return `<div class="match ${won ? 'win' : 'loss'}">${won ? 'W' : 'L'}</div>`;
      }).join("")
    : Array(5).fill(`<div class="match unknown">?</div>`).join("");

  cardEl.innerHTML = `
    <div class="card-header">
      <div class="avatar">${name[0]}</div>
      <div class="username">${name}</div>
      <div class="rank-badge" style="color:${color};border-color:${color}44">
        ${icon} ${rankName ?? "Unranked"}
        ${mmr ? `<span style="color:#666;font-size:0.65rem">(${fmtInt(mmr)})</span>` : ""}
      </div>
    </div>
    <div class="stats-grid">
      <div class="stat"><div class="stat-value">${fmtInt(kills)}</div><div class="stat-label">Kills</div></div>
      <div class="stat"><div class="stat-value">${fmt(kd)}</div><div class="stat-label">K/D</div></div>
      <div class="stat"><div class="stat-value">${fmtInt(wins)}</div><div class="stat-label">Wins</div></div>
      <div class="stat"><div class="stat-value">${fmtInt(losses)}</div><div class="stat-label">Losses</div></div>
      <div class="stat full-width">
        <div class="stat-value">${wl != null ? fmt(wl) : "—"}</div>
        <div class="stat-label">W/L Ratio</div>
      </div>
    </div>
    <div class="section-title">Last 5 Matches</div>
    <div class="match-history">${matchBoxes}</div>
    <button class="refresh-btn" onclick="loadPlayer('${name}', this.closest('.card'))">↻ Refresh</button>`;
}

async function loadPlayer(name, cardEl) {
  cardEl.innerHTML = loadingHTML(name);

  try {
    const res = await fetch(`${PROXY_URL}?username=${encodeURIComponent(name)}`);
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      cardEl.innerHTML = errorHTML(name, err.error ?? `HTTP ${res.status}`);
      return;
    }
    const data = await res.json();

    // If data looks empty/errored from r6data side
    if (data.stats?.error || data.account?.error) {
      cardEl.innerHTML = errorHTML(name, data.stats?.error ?? data.account?.error ?? "Player not found");
      return;
    }

    renderStats(cardEl, name, data);
  } catch (err) {
    cardEl.innerHTML = errorHTML(name, `Failed to load: ${err.message}`);
  }
}

async function loadAll() {
  const dashboard = document.getElementById("dashboard");
  dashboard.innerHTML = "";
  for (const p of PLAYERS) {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = loadingHTML(p.name);
    dashboard.appendChild(card);
  }
  const cards = [...dashboard.querySelectorAll(".card")];
  for (let i = 0; i < PLAYERS.length; i++) {
    await loadPlayer(PLAYERS[i].name, cards[i]);
    await new Promise(r => setTimeout(r, 300));
  }
  document.getElementById("lastUpdated").textContent =
    `Last updated: ${new Date().toLocaleTimeString()}`;
}

loadAll();
</script>
</body>
</html>
